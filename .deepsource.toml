version = 1

exclude_patterns = [
  "dist/**",
  "coverage/**",
  ".agents/**",
  ".tmp/**",
  "docs/examples/**"
]

test_patterns = [
  "tests/**",
  "benchmarks/**",
  "**/*.spec.ts",
  "**/*.bench.ts"
]

[[analyzers]]
name = "javascript"

  [analyzers.meta]
  dialect = "typescript"
  environment = ["nodejs", "vitest"]
  module_system = "es-modules"
  cyclomatic_complexity_threshold = "high"

[[analyzers]]
name = "secrets"
