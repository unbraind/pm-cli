name: Bug Report
description: Report a bug in pm-cli
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the sections below to help us reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: pm-cli version
      description: Run `pm --version` and paste the output here.
      placeholder: "2026.3.9"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Run `node --version` and paste the output here.
      placeholder: "v20.0.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      description: e.g. Ubuntu 22.04, macOS 14, Windows 11
      placeholder: "Ubuntu 24.04"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `pm init`
        2. Run `pm create --title "test" ...`
        3. Observe error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include command output or error messages.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, screenshots, or relevant information.
