version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    # Keep bumps older than pnpm's supply-chain minimum-release-age check so
    # dependabot PRs don't fail CI install on freshly published versions.
    cooldown:
      default-days: 3
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    # Bump all actions in one PR: codeql-action init/analyze must move in
    # lockstep or the Analyze job fails on a config/runtime version mismatch.
    groups:
      github-actions:
        patterns:
          - "*"
