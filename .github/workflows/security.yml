name: Security and Script Quality

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Weekly rescan of main so newly published CVEs surface without a code change.
    - cron: "17 5 * * 1"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy:
    name: Trivy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Filesystem scan over the repository: dependency vulnerabilities
      # (pnpm-lock.yaml), leaked secrets, and IaC/workflow misconfigurations.
      # exit-code 1 makes every finding a hard failure; this job is a required
      # branch-protection check, so findings block merges. Exception handling for
      # genuinely unfixable false-positive findings must go through .trivyignore
      # with a short comment and a follow-up owner/date; never edit this workflow
      # to bypass a finding.
      - name: Trivy repository scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: false
          trivyignores: .trivyignore
          skip-dirs: node_modules,dist,coverage,.pnpm-store

  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Full history so the action can resolve push/PR commit ranges and
          # scheduled runs can rescan the entire history.
          fetch-depth: 0

      # Verified-credential detection on top of Trivy's pattern-based secret
      # scan: TruffleHog re-checks candidate secrets against the issuing
      # provider and fails on live (verified) or unverifiable (unknown)
      # results. push/PR events scan the changed commit range; scheduled runs
      # rescan everything. Known-benign paths are excluded via
      # .trufflehog-exclude-paths.txt (one unanchored path regex per line):
      # a deliberate basic-auth URI test fixture in the health-command spec,
      # plus the two pm-4ris tracker files whose git history contains a
      # since-redacted quote of that same fixture. Never add entries to
      # silence a real finding.
      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          extra_args: --results=verified,unknown --exclude-paths=.trufflehog-exclude-paths.txt

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Strictest severity (style) over every tracked shell script; any finding
      # fails. xargs -r keeps the gate green if no .sh files are tracked.
      - name: ShellCheck all tracked shell scripts
        run: |
          shellcheck --version
          git ls-files -z -- '*.sh' | xargs -0 -r shellcheck --severity=style

  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Every tracked PowerShell script is analyzed at all severities
      # (Error, Warning, Information); any finding fails the gate.
      - name: PSScriptAnalyzer all tracked PowerShell scripts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $moduleName = 'PSScriptAnalyzer'
          $moduleVersion = '1.24.0'
          $packageFile = "$moduleName.$moduleVersion.nupkg"
          $packagePath = Join-Path $env:RUNNER_TEMP $packageFile
          $expectedSha256 = 'e86c97d44bb1bc8a1de35e753b85ea1d938f6f9f881639a181507e079bca4556'
          Invoke-WebRequest -Uri "https://www.powershellgallery.com/api/v2/package/$moduleName/$moduleVersion" -OutFile $packagePath
          $actualSha256 = (Get-FileHash -Path $packagePath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualSha256 -ne $expectedSha256) {
            throw "PSScriptAnalyzer package hash mismatch: expected $expectedSha256 but got $actualSha256."
          }
          $moduleRoot = Join-Path $env:RUNNER_TEMP 'psmodules'
          $modulePath = Join-Path (Join-Path $moduleRoot $moduleName) $moduleVersion
          New-Item -ItemType Directory -Force -Path $modulePath | Out-Null
          Expand-Archive -Path $packagePath -DestinationPath $modulePath -Force
          Import-Module (Join-Path $modulePath 'PSScriptAnalyzer.psd1') -Force
          $files = git ls-files -- '*.ps1' '*.psm1' '*.psd1'
          if (-not $files) { Write-Host 'No PowerShell scripts tracked.'; exit 0 }
          $findings = @($files | ForEach-Object {
            Invoke-ScriptAnalyzer -Path $_ -Severity @('Error', 'Warning', 'Information')
          })
          if ($findings.Count -gt 0) {
            $findings | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize | Out-String -Width 400 | Write-Host
            Write-Error "PSScriptAnalyzer reported $($findings.Count) finding(s)."
            exit 1
          }
          Write-Host 'PSScriptAnalyzer: no findings.'

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Lints every workflow (expression typing, runner labels, permissions,
      # and embedded run: scripts via shellcheck). Download the pinned release
      # asset directly and verify its SHA-256 before executing it.
      - name: Run actionlint on all workflows
        run: |
          version=1.7.12
          asset="actionlint_${version}_linux_amd64.tar.gz"
          expected_sha="8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
          curl -fsSLO "https://github.com/rhysd/actionlint/releases/download/v${version}/${asset}"
          printf '%s  %s\n' "$expected_sha" "$asset" | sha256sum --check --strict
          tar -xzf "$asset" actionlint
          ./actionlint -color
