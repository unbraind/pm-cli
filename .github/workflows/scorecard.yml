name: OSSF Scorecard

on:
  push:
    branches:
      - main
  schedule:
    # Weekly supply-chain posture rescan so score changes surface without a code change.
    - cron: "23 4 * * 1"
  # Re-evaluate immediately when branch-protection settings change.
  branch_protection_rule:
  workflow_dispatch:

permissions: read-all

concurrency:
  group: scorecard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # Needed to upload SARIF results to the code-scanning dashboard.
      security-events: write
      # Needed by scorecard-action to publish signed results to the OpenSSF REST API/badge.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Public repo: publish results so the OpenSSF badge and API stay live.
          publish_results: true

      - name: Upload Scorecard SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - name: Upload results to code scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif
