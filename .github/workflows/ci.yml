name: CI

on:
  push:
    branches:
      - main
    # paths uses last-match-wins so plugin markdown (slash commands, skills,
    # subagents — functional assets smoke-tested in CI) re-includes after the
    # blanket markdown exclusion. paths-ignore cannot express re-includes.
    paths:
      - "**"
      - "!docs/**"
      - "!**/*.md"
      - "!.github/ISSUE_TEMPLATE/**"
      - "plugins/**"
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-foundation:
    name: Build foundation (Ubuntu, Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm

      - name: Restore TypeScript and Vitest caches
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            .cache/tsbuildinfo
            .cache/vitest
          key: pm-cli-validation-cache-${{ runner.os }}-node20-${{ hashFiles('pnpm-lock.yaml', 'tsconfig*.json', 'vitest.config.ts', 'src/**/*.ts', 'tests/**/*.ts', 'packages/**/*.ts') }}
          restore-keys: |
            pm-cli-validation-cache-${{ runner.os }}-node20-
            pm-cli-validation-cache-${{ runner.os }}-

      - name: Restore LanceDB cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            .agents/pm/search/lancedb
          key: pm-cli-observability-cache-${{ runner.os }}-node20-${{ hashFiles('pnpm-lock.yaml', '.agents/pm/settings.json', '.agents/pm/**/*.toon', '.agents/pm/**/*.md', 'src/**/*.ts', 'scripts/**/*.mjs', 'tests/**/*.ts') }}
          restore-keys: |
            pm-cli-observability-cache-${{ runner.os }}-node20-
            pm-cli-observability-cache-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-node20-ubuntu
          path: dist
          if-no-files-found: error

  build-test:
    name: Runtime smoke (${{ matrix.os }}, Node ${{ matrix.node }})
    needs: build-foundation
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 20
          - os: macos-latest
            node: 20
          - os: ubuntu-latest
            node: 22
          - os: ubuntu-latest
            node: 24

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}

      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-node20-ubuntu
          path: dist

      - name: Dist artifact version smoke
        run: node dist/cli.js --version

  gates:
    name: Gates (${{ matrix.gate }})
    needs: build-foundation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        gate:
          - coverage
          - typecheck
          - static
          - compat
          - smokes

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm

      - name: Restore TypeScript and Vitest caches
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            .cache/tsbuildinfo
            .cache/vitest
          key: pm-cli-validation-cache-${{ runner.os }}-node20-${{ hashFiles('pnpm-lock.yaml', 'tsconfig*.json', 'vitest.config.ts', 'src/**/*.ts', 'tests/**/*.ts', 'packages/**/*.ts') }}
          restore-keys: |
            pm-cli-validation-cache-${{ runner.os }}-node20-
            pm-cli-validation-cache-${{ runner.os }}-

      - name: Restore LanceDB cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            .agents/pm/search/lancedb
          key: pm-cli-observability-cache-${{ runner.os }}-node20-${{ hashFiles('pnpm-lock.yaml', '.agents/pm/settings.json', '.agents/pm/**/*.toon', '.agents/pm/**/*.md', 'src/**/*.ts', 'scripts/**/*.mjs', 'tests/**/*.ts') }}
          restore-keys: |
            pm-cli-observability-cache-${{ runner.os }}-node20-
            pm-cli-observability-cache-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-node20-ubuntu
          path: dist

      - name: Run coverage gate
        if: matrix.gate == 'coverage'
        env:
          PM_RUN_TESTS_SKIP_BUILD: "1"
        run: pnpm test:coverage

      - name: Run typecheck gate
        if: matrix.gate == 'typecheck'
        run: pnpm typecheck

      - name: Run static + secret + version gates
        if: matrix.gate == 'static'
        run: |
          pnpm version:check
          pnpm changelog:pm:check
          pnpm contracts:check
          pnpm security:scan
          pnpm quality:static
          npm pack --dry-run

      - name: Run compatibility migration gate
        if: matrix.gate == 'compat'
        timeout-minutes: 6
        run: node scripts/release/compatibility-check.mjs --json

      - name: Run npx + plugin smoke gates
        if: matrix.gate == 'smokes'
        run: |
          pnpm smoke:npx
          pnpm dogfood:package-first
          node scripts/smoke-claude-plugin.mjs

      - name: Run advisory search eval harness
        if: matrix.gate == 'smokes'
        continue-on-error: true
        run: |
          node dist/cli.js install search-advanced --project --json
          node dist/cli.js reindex --mode keyword --eval --eval-fixtures tests/search-eval/golden-queries.json --json

      - name: Upload coverage artifact
        if: always() && matrix.gate == 'coverage'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-node20-ubuntu-latest
          path: coverage
          if-no-files-found: ignore

  windows-regression:
    name: Windows regression (Node 20)
    # Gate this focused Windows slice on a green foundation build; the job is
    # otherwise self-contained because it must install and run on windows-latest.
    needs: build-foundation
    runs-on: windows-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm

      - name: Restore TypeScript and Vitest caches
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            .cache/tsbuildinfo
            .cache/vitest
          key: pm-cli-validation-cache-${{ runner.os }}-node20-${{ hashFiles('pnpm-lock.yaml', 'tsconfig*.json', 'vitest.config.ts', 'src/**/*.ts', 'tests/**/*.ts', 'packages/**/*.ts') }}
          restore-keys: |
            pm-cli-validation-cache-${{ runner.os }}-node20-
            pm-cli-validation-cache-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Guards every Windows-only test class the nightly exposed:
      # (1) file://-URL TypeScript source imports (sourceModule helper),
      # (2) .mjs script imports whose shebang must be stripped by the test
      #     transform (scriptModule helper + the strip-script-shebang Vite
      #     plugin), and
      # (3) the path-separator / mocked-path class across tests/unit/scripts/**
      #     (POSIX-keyed fs mocks vs native separators, win32 `.cmd` command
      #     resolution, and native-separator path assertions) closed in pm-s5pe.
      # The two non-scripts guards (cli-main-errors, runtime-schema-path-win32)
      # plus the harness contract test stay pinned; the full tests/unit/scripts/
      # directory now runs so a fresh Windows-only script regression fails this
      # required per-PR check rather than only the nightly.
      - name: Run Windows source-import and script regression tests
        env:
          PM_RUN_TESTS_SKIP_BUILD: "1"
        run: node scripts/run-tests.mjs test -- tests/unit/cli/cli-main-errors.spec.ts tests/unit/core/schema/runtime-schema-path-win32-guard.spec.ts tests/unit/helpers/scriptModule.spec.ts tests/unit/scripts/
