name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build/Test (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 20
          - os: macos-latest
            node: 20
          - os: windows-latest
            node: 20
          - os: ubuntu-latest
            node: 22
          - os: ubuntu-latest
            node: 24

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@cb9c4fdd700176d874d52d64ce3b7418842cf6d3 # v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Version policy check
        if: matrix.os == 'ubuntu-latest' && matrix.node == 20
        run: pnpm version:check

      - name: Secret leak scan
        if: matrix.os == 'ubuntu-latest' && matrix.node == 20
        run: pnpm security:scan

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        env:
          PM_RUN_TESTS_SKIP_BUILD: "1"
        run: pnpm test

      - name: Test with coverage gate
        if: matrix.os == 'ubuntu-latest' && matrix.node == 20
        env:
          PM_RUN_TESTS_SKIP_BUILD: "1"
        run: pnpm test:coverage

      - name: Static quality gate
        if: matrix.os == 'ubuntu-latest' && matrix.node == 20
        run: pnpm quality:static

      - name: Compatibility migration gate
        if: matrix.os == 'ubuntu-latest' && matrix.node == 20
        timeout-minutes: 6
        run: node scripts/release/compatibility-check.mjs --json

      - name: Packaging smoke check
        if: matrix.os == 'ubuntu-latest' && matrix.node == 20
        run: npm pack --dry-run

      - name: npx tarball smoke check
        if: matrix.os == 'ubuntu-latest' && matrix.node == 20
        run: pnpm smoke:npx

      - name: Upload coverage artifact
        if: always() && matrix.os == 'ubuntu-latest' && matrix.node == 20
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-node${{ matrix.node }}-${{ matrix.os }}
          path: coverage
          if-no-files-found: ignore
