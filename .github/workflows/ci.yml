name: CI

on:
  push:
    branches:
      - main
    # paths uses last-match-wins so plugin markdown (slash commands, skills,
    # subagents — functional assets smoke-tested in CI) re-includes after the
    # blanket markdown exclusion. paths-ignore cannot express re-includes.
    paths:
      - "**"
      - "!docs/**"
      - "!**/*.md"
      - "!.github/ISSUE_TEMPLATE/**"
      - "plugins/**"
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-foundation:
    name: Build foundation (Ubuntu, Node 24)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.10.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Restore TypeScript and Vitest caches
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .cache/tsbuildinfo
            .cache/vitest
          key: pm-cli-validation-cache-${{ runner.os }}-node24-${{ hashFiles('pnpm-lock.yaml', 'tsconfig*.json', 'vitest.config.ts', 'src/**/*.ts', 'tests/**/*.ts', 'packages/**/*.ts') }}
          restore-keys: |
            pm-cli-validation-cache-${{ runner.os }}-node24-
            pm-cli-validation-cache-${{ runner.os }}-

      - name: Restore LanceDB cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .agents/pm/search/lancedb
          key: pm-cli-observability-cache-${{ runner.os }}-node24-${{ hashFiles('pnpm-lock.yaml', '.agents/pm/settings.json', '.agents/pm/**/*.toon', '.agents/pm/**/*.md', 'src/**/*.ts', 'scripts/**/*.mjs', 'tests/**/*.ts') }}
          restore-keys: |
            pm-cli-observability-cache-${{ runner.os }}-node24-
            pm-cli-observability-cache-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-node24-ubuntu
          path: dist
          if-no-files-found: error

  build-test:
    name: Runtime smoke (${{ matrix.os }}, Node ${{ matrix.node }})
    needs: build-foundation
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 22
          - os: macos-latest
            node: 24
          - os: ubuntu-latest
            node: 24

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: ${{ matrix.node }}

      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-node24-ubuntu
          path: dist

      - name: Dist artifact version smoke
        run: node dist/cli.js --version

      - name: Node 22 TypeScript extension loading smoke
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        shell: bash
        run: |
          temp_root="$(mktemp -d)"
          runtime_dir="${temp_root}/.agents/pm/extensions/beads"
          mkdir -p "${runtime_dir}"
          printf 'export const marker: string = "node22-ts-runtime";\n' > "${runtime_dir}/runtime.ts"
          export PM_CLI_PACKAGE_ROOT="${temp_root}"
          # ${...} inside the single-quoted -e script are JS template literals, not shell expansions.
          # shellcheck disable=SC2016
          node --input-type=module -e 'const { pathToFileURL } = await import("node:url"); const loader = await import(pathToFileURL(`${process.env.GITHUB_WORKSPACE}/packages/pm-beads/extensions/beads/runtime-loader.ts`).href); const runtime = await loader.loadPackageRuntimeModule(); if (runtime.marker !== "node22-ts-runtime") throw new Error(`unexpected runtime marker: ${String(runtime.marker)}`);'

  gates:
    name: Gates (${{ matrix.gate }})
    needs: build-foundation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        gate:
          - typecheck
          - static
          - compat
          - smokes

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.10.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Restore TypeScript and Vitest caches
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .cache/tsbuildinfo
            .cache/vitest
          key: pm-cli-validation-cache-${{ runner.os }}-node24-${{ hashFiles('pnpm-lock.yaml', 'tsconfig*.json', 'vitest.config.ts', 'src/**/*.ts', 'tests/**/*.ts', 'packages/**/*.ts') }}
          restore-keys: |
            pm-cli-validation-cache-${{ runner.os }}-node24-
            pm-cli-validation-cache-${{ runner.os }}-

      - name: Restore LanceDB cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .agents/pm/search/lancedb
          key: pm-cli-observability-cache-${{ runner.os }}-node24-${{ hashFiles('pnpm-lock.yaml', '.agents/pm/settings.json', '.agents/pm/**/*.toon', '.agents/pm/**/*.md', 'src/**/*.ts', 'scripts/**/*.mjs', 'tests/**/*.ts') }}
          restore-keys: |
            pm-cli-observability-cache-${{ runner.os }}-node24-
            pm-cli-observability-cache-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-node24-ubuntu
          path: dist

      - name: Run typecheck gate
        if: matrix.gate == 'typecheck'
        run: pnpm typecheck

      - name: Run static + secret + version gates
        if: matrix.gate == 'static'
        run: |
          pnpm version:check
          pnpm changelog:pm:check
          pnpm contracts:check
          pnpm security:scan
          pnpm lint
          npm pack --dry-run

      # Merge-safety gates for the tracked .agents/pm workspace (pm-iwsj):
      # storage integrity catches corrupted/unmergeable tracker artifacts that
      # slipped past the merge drivers; strict history verification selects the
      # newest tracked item dynamically and fails when no representative exists.
      - name: Run tracker merge-safety gates
        if: matrix.gate == 'static'
        run: |
          node dist/cli.js validate --check-storage-integrity --json
          representative_id="$(node dist/cli.js list --status all --limit 1 --sort created_at --order desc --json | jq -er '.items[0].id')"
          node dist/cli.js history "${representative_id}" --verify --strict-exit --json > /dev/null

      - name: Run compatibility migration gate
        if: matrix.gate == 'compat'
        timeout-minutes: 6
        run: node scripts/release/compatibility-check.mjs --json

      - name: Run npx + plugin smoke gates
        if: matrix.gate == 'smokes'
        run: |
          pnpm smoke:npx
          pnpm dogfood:package-first
          node scripts/smoke-claude-plugin.mjs

      - name: Run advisory search eval harness
        if: matrix.gate == 'smokes'
        continue-on-error: true
        run: |
          node dist/cli.js install search-advanced --project --json
          node dist/cli.js reindex --mode keyword --eval --eval-fixtures tests/search-eval/golden-queries.json --json

      - name: Run required context relevance evaluation gate
        if: matrix.gate == 'smokes'
        run: pnpm quality:context-eval

  coverage-shards:
    name: Coverage shard ${{ matrix.shard }}/4
    needs: build-foundation
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.10.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-node24-ubuntu
          path: dist

      - name: Run coverage shard
        env:
          PM_RUN_TESTS_SKIP_BUILD: "1"
        run: >-
          pnpm test:coverage --
          --shard=${{ matrix.shard }}/4
          --reporter=blob
          --outputFile.blob=.vitest-reports/blob-${{ matrix.shard }}.json
          --coverage.thresholds.lines=0
          --coverage.thresholds.branches=0
          --coverage.thresholds.functions=0
          --coverage.thresholds.statements=0

      - name: Upload coverage shard report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-blob-${{ matrix.shard }}
          path: .vitest-reports/blob-${{ matrix.shard }}.json
          if-no-files-found: error

  coverage:
    name: Gates (coverage)
    needs: coverage-shards
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.10.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download coverage shard reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-blob-*
          merge-multiple: true
          path: .vitest-reports

      - name: Merge coverage and enforce global thresholds
        run: pnpm exec vitest --merge-reports=.vitest-reports --coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-node24-ubuntu-latest
          path: coverage
          if-no-files-found: ignore

      # Codecov ingests the v8 line-level lcov report. `!cancelled()` so coverage
      # still uploads when the gate fails on the 100% threshold (that is exactly
      # when the Codecov report is most useful for diagnosis).
      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          disable_search: true
          flags: unittests
          name: pm-cli-coverage
          override_branch: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          override_commit: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fail_ci_if_error: true
          verbose: true

      # Codecov Test Analytics ingests the JUnit report for flaky-test and
      # failure analytics. Runs on failure too so failing tests are recorded.
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: ./coverage/junit.xml
          disable_search: true
          flags: unittests
          name: pm-cli-test-results
          override_branch: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          override_commit: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fail_ci_if_error: true
          verbose: true

  windows-regression:
    name: Windows regression (Node 24)
    # Gate this focused Windows slice on a green foundation build; the job is
    # otherwise self-contained because it must install and run on windows-latest.
    needs: build-foundation
    runs-on: windows-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.10.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Restore TypeScript and Vitest caches
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .cache/tsbuildinfo
            .cache/vitest
          key: pm-cli-validation-cache-${{ runner.os }}-node24-${{ hashFiles('pnpm-lock.yaml', 'tsconfig*.json', 'vitest.config.ts', 'src/**/*.ts', 'tests/**/*.ts', 'packages/**/*.ts') }}
          restore-keys: |
            pm-cli-validation-cache-${{ runner.os }}-node24-
            pm-cli-validation-cache-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Guards every Windows-only test class the nightly exposed:
      # (1) file://-URL TypeScript source imports (sourceModule helper),
      # (2) .mjs script imports whose shebang must be stripped by the test
      #     transform (scriptModule helper + the strip-script-shebang Vite
      #     plugin),
      # (3) the path-separator / mocked-path class across tests/unit/scripts/**
      #     (POSIX-keyed fs mocks vs native separators, win32 `.cmd` command
      #     resolution, and native-separator path assertions) closed in pm-s5pe,
      # (4) the generated package runtime-loaders, whose ERR_MODULE_NOT_FOUND
      #     path-normalization coverage must not synthesize colon-bearing
      #     directory names that are illegal on Windows (GH-348), and
      # (5) the telemetry runtime's detached flush scheduler, whose unit suite
      #     must mock the spawn rather than launch a real, network-touching
      #     node child that lingers and crashes the vitest worker on teardown
      #     (GH-348), and
      # (6) background test-run signal handling, whose unit helpers must not
      #     send OS-level signals to the Vitest worker process on Windows
      #     (GH-376), and
      # (7) stale lock cleanup races, whose owner-path and orphan-gate probes
      #     must stay portable on Windows Node 24 (GH-427), and
      # (8) native-path command rendering plus package-source suffix checks,
      #     which must preserve Windows separators (GH-522 / pm-u5zr).
      # The two non-scripts guards (cli-main-errors, runtime-schema-path-win32)
      # plus the harness contract test stay pinned; the full tests/unit/scripts/
      # directory now runs so a fresh Windows-only script regression fails this
      # required per-PR check rather than only the nightly.
      - name: Run Windows source-import and script regression tests
        env:
          PM_RUN_TESTS_SKIP_BUILD: "1"
        run: node scripts/run-tests.mjs test -- tests/unit/cli/cli-main-errors.spec.ts tests/unit/cli/argv-utils.spec.ts tests/unit/core/schema/runtime-schema-path-win32-guard.spec.ts tests/unit/helpers/scriptModule.spec.ts tests/unit/scripts/ tests/unit/packages/runtime-loaders.spec.ts tests/unit/packages/package-manifest.spec.ts tests/unit/core/telemetry/telemetry-runtime.spec.ts tests/unit/commands/init-command.spec.ts tests/integration/init-path-guard.integration.spec.ts tests/unit/commands/test-runs-command.spec.ts tests/unit/core/item/core-item-lock-coverage.spec.ts

      # The packed-npm-extension install path exercises the Windows `.cmd` npm
      # spawn + tar extraction + hosted-SDK junction class that only the Node 24
      # nightly previously caught (GH-348). Run just that integration case here so
      # a Windows-only install regression fails this required per-PR check.
      - name: Run Windows packed-npm-extension install regression test
        env:
          PM_RUN_TESTS_SKIP_BUILD: "1"
        run: node scripts/run-tests.mjs test -- tests/integration/cli.integration.spec.ts -t "installs runtime dependencies for packed npm package extensions"
