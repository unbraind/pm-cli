name: Nightly Validation

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly:
    name: Nightly (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node:
          - 20
          - 22
          - 24
          - 25

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Restore TypeScript and Vitest caches
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            .cache/tsbuildinfo
            .cache/vitest
          key: pm-cli-validation-cache-${{ runner.os }}-node${{ matrix.node }}-${{ hashFiles('pnpm-lock.yaml', 'tsconfig*.json', 'vitest.config.ts', 'src/**/*.ts', 'tests/**/*.ts', 'packages/**/*.ts') }}
          restore-keys: |
            pm-cli-validation-cache-${{ runner.os }}-node${{ matrix.node }}-
            pm-cli-validation-cache-${{ runner.os }}-

      - name: Restore LanceDB and Sentry caches
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            .agents/pm/search/lancedb
            ~/.cache/sentry-cli
          key: pm-cli-observability-cache-${{ runner.os }}-node${{ matrix.node }}-${{ hashFiles('pnpm-lock.yaml', '.agents/pm/settings.json', '.agents/pm/**/*.toon', '.agents/pm/**/*.md', 'src/**/*.ts', 'scripts/**/*.mjs', 'tests/**/*.ts') }}
          restore-keys: |
            pm-cli-observability-cache-${{ runner.os }}-node${{ matrix.node }}-
            pm-cli-observability-cache-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Version policy check
        if: matrix.node == 20
        run: pnpm version:check

      - name: Secret leak scan
        if: matrix.node == 20
        run: pnpm security:scan

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test with coverage gate
        if: matrix.node == 20
        env:
          PM_RUN_TESTS_SKIP_BUILD: "1"
        run: pnpm test:coverage

      - name: Static quality gate
        if: matrix.node == 20
        run: pnpm quality:static

      - name: Compatibility migration gate
        if: matrix.node == 20
        timeout-minutes: 6
        run: node scripts/release/compatibility-check.mjs --json

      - name: Test
        if: matrix.node != 20
        env:
          PM_RUN_TESTS_SKIP_BUILD: "1"
        run: pnpm test
