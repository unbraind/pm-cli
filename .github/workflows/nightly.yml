name: Nightly Validation

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly:
    name: Nightly (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, node: 22 }
          - { os: ubuntu-latest, node: 24 }
          - { os: ubuntu-latest, node: 25 }
          - { os: macos-latest, node: 24 }
          - { os: windows-latest, node: 24 }

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.33.4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Restore TypeScript and Vitest caches
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            .cache/tsbuildinfo
            .cache/vitest
          key: pm-cli-validation-cache-${{ runner.os }}-node${{ matrix.node }}-${{ hashFiles('pnpm-lock.yaml', 'tsconfig*.json', 'vitest.config.ts', 'src/**/*.ts', 'tests/**/*.ts', 'packages/**/*.ts') }}
          restore-keys: |
            pm-cli-validation-cache-${{ runner.os }}-node${{ matrix.node }}-
            pm-cli-validation-cache-${{ runner.os }}-

      - name: Restore LanceDB cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            .agents/pm/search/lancedb
          key: pm-cli-observability-cache-${{ runner.os }}-node${{ matrix.node }}-${{ hashFiles('pnpm-lock.yaml', '.agents/pm/settings.json', '.agents/pm/**/*.toon', '.agents/pm/**/*.md', 'src/**/*.ts', 'scripts/**/*.mjs', 'tests/**/*.ts') }}
          restore-keys: |
            pm-cli-observability-cache-${{ runner.os }}-node${{ matrix.node }}-
            pm-cli-observability-cache-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Version policy check
        if: matrix.os == 'ubuntu-latest' && matrix.node == 24
        run: pnpm version:check

      - name: Secret leak scan
        if: matrix.os == 'ubuntu-latest' && matrix.node == 24
        run: pnpm security:scan

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test with coverage gate
        if: matrix.os == 'ubuntu-latest' && matrix.node == 24
        env:
          PM_RUN_TESTS_SKIP_BUILD: "1"
        run: pnpm test:coverage

      - name: Static quality gate
        if: matrix.os == 'ubuntu-latest' && matrix.node == 24
        run: pnpm quality:static

      - name: Compatibility migration gate
        if: matrix.os == 'ubuntu-latest' && matrix.node == 24
        timeout-minutes: 6
        run: node scripts/release/compatibility-check.mjs --json

      - name: Test
        if: matrix.os != 'ubuntu-latest' || matrix.node != 24
        env:
          PM_RUN_TESTS_SKIP_BUILD: "1"
        run: pnpm test

      - name: Alert on scheduled nightly failure
        if: failure() && github.event_name == 'schedule'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          NIGHTLY_OS: ${{ matrix.os }}
          NIGHTLY_NODE: ${{ matrix.node }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          NIGHTLY_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          title="Nightly Validation failed: ${NIGHTLY_OS} / Node ${NIGHTLY_NODE}"
          existing_issue="$(gh issue list --state open --search "\"${title}\" in:title" --json number --jq '.[0].number // empty')"
          body="Scheduled Nightly Validation failed for ${NIGHTLY_OS} / Node ${NIGHTLY_NODE}.

          Run: ${RUN_URL}
          Commit: ${NIGHTLY_SHA}

          Investigate before trusting the next daily release."

          if [[ -n "${existing_issue}" ]]; then
            gh issue comment "${existing_issue}" --body "${body}"
          else
            gh issue create --title "${title}" --body "${body}"
          fi
