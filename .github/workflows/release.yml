name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v2026.5.5"
        type: string
        required: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, Test, Publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: release
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Restore TypeScript and Vitest caches
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            .cache/tsbuildinfo
            .cache/vitest
          key: pm-cli-validation-cache-${{ runner.os }}-node20-${{ hashFiles('pnpm-lock.yaml', 'tsconfig*.json', 'vitest.config.ts', 'src/**/*.ts', 'tests/**/*.ts', 'packages/**/*.ts') }}
          restore-keys: |
            pm-cli-validation-cache-${{ runner.os }}-node20-
            pm-cli-validation-cache-${{ runner.os }}-

      - name: Restore LanceDB and Sentry caches
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            .agents/pm/search/lancedb
            ~/.cache/sentry-cli
          key: pm-cli-observability-cache-${{ runner.os }}-node20-${{ hashFiles('pnpm-lock.yaml', '.agents/pm/settings.json', '.agents/pm/**/*.toon', '.agents/pm/**/*.md', 'src/**/*.ts', 'scripts/**/*.mjs', 'tests/**/*.ts') }}
          restore-keys: |
            pm-cli-observability-cache-${{ runner.os }}-node20-
            pm-cli-observability-cache-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Version policy + tag guard
        run: |
          case "${RELEASE_TAG}" in
            v*.*.*) ;;
            *)
              echo "Release tag must match v*.*.*; received ${RELEASE_TAG}"
              exit 2
              ;;
          esac
          node scripts/release-version.mjs check --tag "${RELEASE_TAG}"

      - name: Secret leak scan
        run: pnpm security:scan

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Docs and skills gate
        run: pnpm quality:docs-skills

      - name: Test with coverage gate
        env:
          PM_RUN_TESTS_SKIP_BUILD: "1"
        run: pnpm test:coverage

      - name: Static quality gate
        run: pnpm quality:static

      - name: Compatibility migration gate
        timeout-minutes: 6
        run: node scripts/release/compatibility-check.mjs --json

      - name: Reliability threshold gate
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_PERSONAL_ADMIN_TOKEN: ${{ secrets.SENTRY_PERSONAL_ADMIN_TOKEN }}
        run: |
          if [ -z "${SENTRY_PERSONAL_ADMIN_TOKEN:-}" ] && [ -z "${SENTRY_AUTH_TOKEN:-}" ]; then
            echo "No Sentry token is configured; skipping Sentry issue threshold gate."
            exit 0
          fi
          node scripts/release/sentry-telemetry-gate.mjs --json --telemetry-mode off --max-critical 10 --max-high 20

      - name: Upload Sentry sourcemaps
        timeout-minutes: 5
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: unbrained
          SENTRY_PROJECT: pm-cli
        run: |
          if [ -z "${SENTRY_AUTH_TOKEN:-}" ]; then
            echo "SENTRY_AUTH_TOKEN is not configured; skipping Sentry sourcemap upload."
            exit 0
          fi
          RELEASE="pm-cli@${RELEASE_TAG#v}"
          pnpm exec sentry-cli releases new "$RELEASE" --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" \
            || pnpm exec sentry-cli releases info "$RELEASE" --org "$SENTRY_ORG" --project "$SENTRY_PROJECT"
          pnpm exec sentry-cli releases set-commits "$RELEASE" --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" --auto \
            || pnpm exec sentry-cli releases set-commits "$RELEASE" --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" --local --ignore-missing
          pnpm sentry:inject
          pnpm sentry:upload
          pnpm exec sentry-cli releases finalize "$RELEASE" --org "$SENTRY_ORG" --project "$SENTRY_PROJECT"

      - name: Packaging smoke check
        run: npm pack --dry-run

      - name: npx tarball smoke check
        run: pnpm smoke:npx

      - name: Package-first dogfood
        run: pnpm dogfood:package-first

      - name: Generate release notes
        run: node scripts/generate-release-notes.mjs --version "${RELEASE_TAG#v}" --output "$RUNNER_TEMP/release-notes.md"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          path: coverage
          if-no-files-found: ignore

      - name: Upload release notes artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-notes-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          path: ${{ runner.temp }}/release-notes.md
          if-no-files-found: error

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Publish to npm
        timeout-minutes: 5
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          if npm view "@unbrained/pm-cli@${VERSION}" version --json >/dev/null 2>&1; then
            echo "@unbrained/pm-cli@${VERSION} is already published; skipping npm publish."
            exit 0
          fi
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify published package on npm, npx, and bunx
        timeout-minutes: 8
        run: node scripts/release/verify-published-release.mjs --tag "${RELEASE_TAG}" --skip-github-release --json

      - name: Create GitHub release
        uses: softprops/action-gh-release@218a0cad87d638dff9a0383acf010108077227f3 # v3.0.0
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: ${{ runner.temp }}/release-notes.md

      - name: Verify GitHub release metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/release/verify-published-release.mjs --tag "${RELEASE_TAG}" --skip-package --json
