name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, Test, Publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: release

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@cb9c4fdd700176d874d52d64ce3b7418842cf6d3 # v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Version policy + tag guard
        run: node scripts/release-version.mjs check --tag "${GITHUB_REF_NAME}" --verify-next

      - name: Secret leak scan
        run: pnpm security:scan

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test with coverage gate
        env:
          PM_RUN_TESTS_SKIP_BUILD: "1"
        run: pnpm test:coverage

      - name: Static quality gate
        run: pnpm quality:static

      - name: Compatibility migration gate
        timeout-minutes: 6
        run: node scripts/release/compatibility-check.mjs --json

      - name: Reliability threshold gate
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          if [ -z "${SENTRY_AUTH_TOKEN:-}" ]; then
            echo "SENTRY_AUTH_TOKEN is not configured; skipping Sentry threshold gate."
            exit 0
          fi
          node scripts/release/sentry-telemetry-gate.mjs --json --telemetry-mode off --max-critical 0 --max-high 0

      - name: Upload Sentry sourcemaps
        timeout-minutes: 5
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: unbrained
          SENTRY_PROJECT: pm-cli
        run: |
          if [ -z "${SENTRY_AUTH_TOKEN:-}" ]; then
            echo "SENTRY_AUTH_TOKEN is not configured; skipping Sentry sourcemap upload."
            exit 0
          fi
          RELEASE="pm-cli@${GITHUB_REF_NAME#v}"
          pnpm exec sentry-cli releases new "$RELEASE" --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" \
            || pnpm exec sentry-cli releases info "$RELEASE" --org "$SENTRY_ORG" --project "$SENTRY_PROJECT"
          pnpm exec sentry-cli releases set-commits "$RELEASE" --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" --auto \
            || pnpm exec sentry-cli releases set-commits "$RELEASE" --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" --local --ignore-missing
          pnpm sentry:inject
          pnpm sentry:upload
          pnpm exec sentry-cli releases finalize "$RELEASE" --org "$SENTRY_ORG" --project "$SENTRY_PROJECT"

      - name: Packaging smoke check
        run: npm pack --dry-run

      - name: npx tarball smoke check
        run: pnpm smoke:npx

      - name: Generate release notes
        run: node scripts/generate-release-notes.mjs --version "${GITHUB_REF_NAME#v}" --output "$RUNNER_TEMP/release-notes.md"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-release-${{ github.ref_name }}
          path: coverage
          if-no-files-found: ignore

      - name: Upload release notes artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-notes-${{ github.ref_name }}
          path: ${{ runner.temp }}/release-notes.md
          if-no-files-found: error

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Publish to npm
        timeout-minutes: 5
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify published package on npm, npx, and bunx
        timeout-minutes: 8
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          npm view "@unbrained/pm-cli@${VERSION}" version dist.integrity dist.unpackedSize --json
          test "$(npx --yes "@unbrained/pm-cli@${VERSION}" --version)" = "${VERSION}"
          test "$(bunx "@unbrained/pm-cli@${VERSION}" --version)" = "${VERSION}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@218a0cad87d638dff9a0383acf010108077227f3 # v3.0.0
        with:
          body_path: ${{ runner.temp }}/release-notes.md

      - name: Verify GitHub release metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "${GITHUB_REF_NAME}" --json tagName,isDraft,isPrerelease,url
