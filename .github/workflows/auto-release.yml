name: Auto Release

on:
  schedule:
    - cron: "35 2 * * *"
  workflow_dispatch:
    inputs:
      allow_same_day_release:
        description: "Allow manual same-day follow-up release (YYYY.M.D-N)"
        type: boolean
        required: false
        default: false
      push:
        description: "Push commit and tag to trigger publish workflow"
        type: boolean
        required: false
        default: false
      dry_run:
        description: "Run full pipeline without mutating git history"
        type: boolean
        required: false
        default: false
      telemetry_mode:
        description: "Telemetry gate mode"
        type: choice
        required: false
        default: "off"
        options:
          - "off"
          - "best-effort"
          - "required"

permissions:
  actions: write
  contents: write

concurrency:
  group: auto-release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  auto-release:
    name: Auto release pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: release

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm

      - name: Restore TypeScript and Vitest caches
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            .cache/tsbuildinfo
            .cache/vitest
          key: pm-cli-validation-cache-${{ runner.os }}-node20-${{ hashFiles('pnpm-lock.yaml', 'tsconfig*.json', 'vitest.config.ts', 'src/**/*.ts', 'tests/**/*.ts', 'packages/**/*.ts') }}
          restore-keys: |
            pm-cli-validation-cache-${{ runner.os }}-node20-
            pm-cli-validation-cache-${{ runner.os }}-

      - name: Restore LanceDB cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            .agents/pm/search/lancedb
          key: pm-cli-observability-cache-${{ runner.os }}-node20-${{ hashFiles('pnpm-lock.yaml', '.agents/pm/settings.json', '.agents/pm/**/*.toon', '.agents/pm/**/*.md', 'src/**/*.ts', 'scripts/**/*.mjs', 'tests/**/*.ts') }}
          restore-keys: |
            pm-cli-observability-cache-${{ runner.os }}-node20-
            pm-cli-observability-cache-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run auto release pipeline
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          # GitHub Actions evaluates boolean `false` as falsy in `&& ... || ...`
          # ternaries, so the naive `inputs.push || 'true'` silently overrides
          # an explicit `push=false`. Nest a second ternary that coerces the
          # boolean input into the literal string 'true'/'false' first, then
          # fall through to the schedule default with the outer ternary.
          INPUT_ALLOW_SAME_DAY_RELEASE: ${{ github.event_name == 'workflow_dispatch' && (inputs.allow_same_day_release && 'true' || 'false') || 'false' }}
          INPUT_PUSH: ${{ github.event_name == 'workflow_dispatch' && (inputs.push && 'true' || 'false') || 'true' }}
          INPUT_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && (inputs.dry_run && 'true' || 'false') || 'false' }}
          INPUT_TELEMETRY_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.telemetry_mode || 'off' }}
          GH_TOKEN: ${{ github.token }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_PERSONAL_ADMIN_TOKEN: ${{ secrets.SENTRY_PERSONAL_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${INPUT_DRY_RUN}" == "true" && "${INPUT_PUSH}" == "true" ]]; then
            echo "dry_run=true cannot be combined with push=true"
            exit 2
          fi
          if [[ "${INPUT_PUSH}" == "true" && "${INPUT_DRY_RUN}" != "true" && -z "${SENTRY_PERSONAL_ADMIN_TOKEN:-}" ]]; then
            echo "SENTRY_PERSONAL_ADMIN_TOKEN is required before Auto Release can create a version commit/tag."
            echo "The downstream Release workflow treats the Sentry reliability gate as mandatory; failing here prevents unpublished tags."
            exit 1
          fi

          args=(--json --author "github-actions[bot]" --telemetry-mode "${INPUT_TELEMETRY_MODE}")
          if [[ "${INPUT_ALLOW_SAME_DAY_RELEASE}" == "true" ]]; then
            args+=(--allow-same-day-release)
          fi
          if [[ "${INPUT_DRY_RUN}" == "true" ]]; then
            args+=(--dry-run)
          fi
          if [[ "${INPUT_PUSH}" == "true" ]]; then
            args+=(--push)
          fi
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          node scripts/release/run-release-pipeline.mjs "${args[@]}"
          NEW_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [[ "${INPUT_PUSH}" != "true" || "${INPUT_DRY_RUN}" == "true" || -z "${NEW_TAG}" || "${NEW_TAG}" == "${PREVIOUS_TAG}" ]]; then
            echo "No new pushed release tag detected; publish dispatch skipped."
            exit 0
          fi

          echo "Dispatching Release workflow for ${NEW_TAG}."
          gh workflow run release.yml --ref main -f tag="${NEW_TAG}"
          RELEASE_RUN_ID=""
          for attempt in $(seq 1 30); do
            RELEASE_RUN_ID="$(gh run list --workflow Release --event workflow_dispatch --limit 20 --json databaseId,status,createdAt \
              | node -e 'const fs=require("fs"); const runs=JSON.parse(fs.readFileSync(0,"utf8")); const run=runs.find((entry)=>["queued","in_progress","waiting"].includes(entry.status)); if (run) console.log(run.databaseId);')"
            if [[ -n "${RELEASE_RUN_ID}" ]]; then
              break
            fi
            sleep 10
          done
          if [[ -z "${RELEASE_RUN_ID}" ]]; then
            echo "Release workflow dispatch did not become visible in time."
            exit 1
          fi
          gh run watch "${RELEASE_RUN_ID}" --compact --exit-status --interval 30

      - name: Alert on blocked scheduled auto-release
        if: failure() && github.event_name == 'schedule'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          title="Auto Release blocked: scheduled run failed"
          existing_issue="$(gh issue list --state open --search "\"${title}\" in:title" --json number --jq '.[0].number // empty')"
          body="The scheduled daily Auto Release run failed before publishing, so no release was cut.

          Run: ${RUN_URL}
          Commit: ${RELEASE_SHA}

          A common cause is the Sentry/telemetry reliability gate blocking on an unresolved fatal/error issue inside its recent-activity window (\`--sentry-window-days\`). Resolve the issue in Sentry (or inspect the gate's \`blocking_short_ids\`), then re-run Auto Release. This issue is auto-updated so blocked daily releases are never silently skipped."

          if [[ -n "${existing_issue}" ]]; then
            gh issue comment "${existing_issue}" --body "${body}"
          else
            gh issue create --title "${title}" --body "${body}"
          fi
