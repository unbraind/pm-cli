name: Auto Release

on:
  schedule:
    - cron: "35 2 * * *"
  workflow_dispatch:
    inputs:
      push:
        description: "Push commit and tag to trigger publish workflow"
        type: boolean
        required: false
        default: false
      dry_run:
        description: "Run full pipeline without mutating git history"
        type: boolean
        required: false
        default: false
      telemetry_mode:
        description: "Telemetry gate mode"
        type: choice
        required: false
        default: "off"
        options:
          - "off"
          - "best-effort"
          - "required"

permissions:
  # gh run list / gh run watch only read Actions run state.
  actions: read
  contents: write
  # The "Alert on blocked scheduled auto-release" step opens/updates a tracking
  # issue when a scheduled release is blocked; without issues:write the alert
  # itself fails (gh issue create -> "Resource not accessible by integration").
  issues: write

concurrency:
  group: auto-release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  auto-release:
    name: Auto release pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: release

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # Do not persist the elevated release token through checkout or
          # dependency installation. run-release-pipeline scopes RELEASE_PAT to
          # the git push process only.
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.33.4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Restore TypeScript and Vitest caches
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .cache/tsbuildinfo
            .cache/vitest
          key: pm-cli-validation-cache-${{ runner.os }}-node24-${{ hashFiles('pnpm-lock.yaml', 'tsconfig*.json', 'vitest.config.ts', 'src/**/*.ts', 'tests/**/*.ts', 'packages/**/*.ts') }}
          restore-keys: |
            pm-cli-validation-cache-${{ runner.os }}-node24-
            pm-cli-validation-cache-${{ runner.os }}-

      - name: Restore LanceDB cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .agents/pm/search/lancedb
          key: pm-cli-observability-cache-${{ runner.os }}-node24-${{ hashFiles('pnpm-lock.yaml', '.agents/pm/settings.json', '.agents/pm/**/*.toon', '.agents/pm/**/*.md', 'src/**/*.ts', 'scripts/**/*.mjs', 'tests/**/*.ts') }}
          restore-keys: |
            pm-cli-observability-cache-${{ runner.os }}-node24-
            pm-cli-observability-cache-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run auto release pipeline
        id: auto_release
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          # GitHub Actions evaluates boolean `false` as falsy in `&& ... || ...`
          # ternaries, so the naive `inputs.push || 'true'` silently overrides
          # an explicit `push=false`. Nest a second ternary that coerces the
          # boolean input into the literal string 'true'/'false' first, then
          # fall through to the schedule default with the outer ternary.
          INPUT_PUSH: ${{ github.event_name == 'workflow_dispatch' && (inputs.push && 'true' || 'false') || 'true' }}
          INPUT_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && (inputs.dry_run && 'true' || 'false') || 'false' }}
          INPUT_TELEMETRY_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.telemetry_mode || 'off' }}
          RELEASE_PAT_CONFIGURED: ${{ secrets.RELEASE_PAT != '' }}
          RELEASE_PUSH_TOKEN: ${{ secrets.RELEASE_PAT || github.token }}
          GH_TOKEN: ${{ github.token }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_PERSONAL_ADMIN_TOKEN: ${{ secrets.SENTRY_PERSONAL_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${INPUT_DRY_RUN}" == "true" && "${INPUT_PUSH}" == "true" ]]; then
            echo "dry_run=true cannot be combined with push=true"
            exit 2
          fi
          if [[ "${INPUT_PUSH}" == "true" && "${INPUT_DRY_RUN}" != "true" && ( "${RELEASE_PAT_CONFIGURED}" != "true" || -z "${RELEASE_PUSH_TOKEN//[[:space:]]/}" ) ]]; then
            echo "RELEASE_PAT is required before Auto Release can push the checked version commit/tag to protected main."
            echo "Create a release environment secret from a maintainer token with contents:write and branch-protection bypass rights."
            exit 1
          fi
          if [[ "${INPUT_PUSH}" == "true" && "${INPUT_DRY_RUN}" != "true" && -z "${SENTRY_PERSONAL_ADMIN_TOKEN:-}" ]]; then
            echo "SENTRY_PERSONAL_ADMIN_TOKEN is required before Auto Release can create a version commit/tag."
            echo "The downstream Release workflow treats the Sentry reliability gate as mandatory; failing here prevents unpublished tags."
            exit 1
          fi

          args=(--json --author "github-actions[bot]" --telemetry-mode "${INPUT_TELEMETRY_MODE}")
          if [[ "${INPUT_DRY_RUN}" == "true" ]]; then
            args+=(--dry-run)
          fi
          if [[ "${INPUT_PUSH}" == "true" ]]; then
            args+=(--push)
          fi
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          node scripts/release/run-release-pipeline.mjs "${args[@]}"
          NEW_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [[ "${INPUT_PUSH}" != "true" || "${INPUT_DRY_RUN}" == "true" || -z "${NEW_TAG}" || "${NEW_TAG}" == "${PREVIOUS_TAG}" ]]; then
            echo "No new pushed release tag detected; publish dispatch skipped."
            exit 0
          fi

          echo "Waiting for tag-push Release workflow for ${NEW_TAG}."
          RELEASE_RUN_ID=""
          for attempt in $(seq 1 30); do
            RELEASE_RUN_ID="$(gh run list --workflow Release --event push --branch "${NEW_TAG}" --limit 20 --json databaseId,status,headBranch,headSha,createdAt \
              | node -e 'const fs=require("fs"); const tag=process.argv[1]; const runs=JSON.parse(fs.readFileSync(0,"utf8")); const run=runs.find((entry)=>entry.headBranch===tag && ["queued","in_progress","waiting"].includes(entry.status)); if (run) console.log(run.databaseId);' "${NEW_TAG}")"
            if [[ -n "${RELEASE_RUN_ID}" ]]; then
              break
            fi
            sleep 10
          done
          if [[ -z "${RELEASE_RUN_ID}" ]]; then
            echo "Tag-push Release workflow for ${NEW_TAG} did not become visible in time."
            exit 1
          fi
          gh run watch "${RELEASE_RUN_ID}" --compact --exit-status --interval 30
          PUBLISHED_SHA="$(git rev-list -n 1 "${NEW_TAG}")"
          echo "published_tag=${NEW_TAG}" >> "${GITHUB_OUTPUT}"
          echo "published_sha=${PUBLISHED_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Resolve blocked scheduled auto-release issue
        if: success() && github.event_name == 'schedule' && steps.auto_release.outputs.published_tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RELEASE_SHA: ${{ steps.auto_release.outputs.published_sha }}
          RELEASE_TAG: ${{ steps.auto_release.outputs.published_tag }}
        run: |
          set -euo pipefail
          title="Auto Release blocked: scheduled run failed"
          existing_issue=""
          if ! existing_issue="$(gh issue list --state open --search "\"${title}\" in:title" --json number --jq '.[0].number // empty')"; then
            echo "Could not query blocked auto-release issues after successful publish; leaving release status successful."
            exit 0
          fi
          if [[ -z "${existing_issue}" ]]; then
            echo "No open blocked auto-release issue found."
            exit 0
          fi
          body="Scheduled Auto Release succeeded and published \`${RELEASE_TAG}\`.

          Run: ${RUN_URL}
          Commit: ${RELEASE_SHA}

          Closing this stale blocker because the scheduled production path pushed a release tag and the downstream Release workflow completed successfully."

          if ! gh issue close "${existing_issue}" --comment "${body}" --reason completed; then
            echo "Could not close blocked auto-release issue #${existing_issue} after successful publish; leaving release status successful."
            exit 0
          fi

      - name: Alert on blocked scheduled auto-release
        if: failure() && github.event_name == 'schedule'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RELEASE_SHA: ${{ github.sha }}
          INPUT_PUSH: ${{ github.event_name == 'workflow_dispatch' && (inputs.push && 'true' || 'false') || 'true' }}
          INPUT_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && (inputs.dry_run && 'true' || 'false') || 'false' }}
          RELEASE_PAT_CONFIGURED: ${{ secrets.RELEASE_PAT != '' }}
          SENTRY_PERSONAL_ADMIN_TOKEN_CONFIGURED: ${{ secrets.SENTRY_PERSONAL_ADMIN_TOKEN != '' }}
        run: |
          set -euo pipefail
          title="Auto Release blocked: scheduled run failed"
          existing_issue="$(gh issue list --state open --search "\"${title}\" in:title" --json number --jq '.[0].number // empty')"
          detected_cause="Inspect the failed workflow logs for the exact failing command."
          if [[ "${INPUT_PUSH}" == "true" && "${INPUT_DRY_RUN}" != "true" && "${RELEASE_PAT_CONFIGURED}" != "true" ]]; then
            detected_cause="RELEASE_PAT is missing from the release environment; scheduled production releases cannot push the checked version commit/tag to protected main."
          elif [[ "${INPUT_PUSH}" == "true" && "${INPUT_DRY_RUN}" != "true" && "${SENTRY_PERSONAL_ADMIN_TOKEN_CONFIGURED}" != "true" ]]; then
            detected_cause="SENTRY_PERSONAL_ADMIN_TOKEN is missing from the release environment; scheduled production releases cannot run the mandatory reliability gate."
          fi
          body="The scheduled daily Auto Release run failed before publishing, so no release was cut.

          Run: ${RUN_URL}
          Commit: ${RELEASE_SHA}

          Detected preflight state:
          - push: \`${INPUT_PUSH}\`
          - dry_run: \`${INPUT_DRY_RUN}\`
          - release_pat_configured: \`${RELEASE_PAT_CONFIGURED}\`
          - sentry_personal_admin_token_configured: \`${SENTRY_PERSONAL_ADMIN_TOKEN_CONFIGURED}\`
          - detected_cause: ${detected_cause}

          Common causes:
          - \`RELEASE_PAT\` is missing from the release environment, so Auto Release cannot push its checked version commit/tag to protected \`main\`.
          - The Sentry/telemetry reliability gate blocked on an unresolved fatal/error issue inside its recent-activity window (\`--sentry-window-days\`).

          Configure the release push token or resolve the gate's \`blocking_short_ids\`, then re-run Auto Release. This issue is auto-updated so blocked daily releases are never silently skipped."

          if [[ -n "${existing_issue}" ]]; then
            gh issue comment "${existing_issue}" --body "${body}"
          else
            gh issue create --title "${title}" --body "${body}"
          fi
