# CodeFactor configuration for @unbrained/pm-cli
# Docs: https://docs.codefactor.io/common-tasks/ignoring-files/
#
# CodeFactor manages repository ignore settings through its hosted
# Settings > Ignore Files UI. Keep this file as the repo-local checklist for
# those hosted settings so agents can validate the intended analysis scope.
exclude:
  - ".agents/**"      # git-native work-item store: TOON/markdown/JSONL history data, not source
  - "CHANGELOG.md"    # generated by the changelog tool
  - "PRD.md"          # large product-requirements reference document (prose)
  - "pnpm-lock.yaml"  # dependency lockfile
  - "packages/**/runtime-loader.ts"      # generated standalone loaders; drift is enforced by generator tests
  - "plugins/**/scripts/pm-mcp-server.mjs" # generated standalone launchers; drift is enforced by generator tests
  - "tests/**"        # test suite quality is enforced by repo gates; CodeFactor remains focused on shipped code
