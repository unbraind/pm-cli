# CodeFactor configuration for @unbrained/pm-cli
# Docs: https://docs.codefactor.io/
#
# Keep CodeFactor focused on hand-authored source code. Generated data, the
# git-native work-item store, large reference docs, and the dependency lockfile
# are excluded so the grade reflects code quality rather than generated content.
# (Build outputs like dist/ and coverage/ are already untracked via .gitignore,
# so CodeFactor never sees them.)
exclude:
  - ".agents/**"      # git-native work-item store: TOON/markdown/JSONL history data, not source
  - "CHANGELOG.md"    # generated by the changelog tool
  - "PRD.md"          # large product-requirements reference document (prose)
  - "pnpm-lock.yaml"  # dependency lockfile
