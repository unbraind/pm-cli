# Scrutinizer performs static JavaScript analysis only. The real test suite
# and coverage gates run in GitHub Actions; Scrutinizer's build image cannot
# reliably provide Node >=22.18 + pnpm, so dependency installation and test
# execution are disabled here ('true' is a shell no-op).
checks:
  javascript: true

filter:
  excluded_paths:
    - "dist/*"
    - "coverage/*"
    - "node_modules/*"
    - ".agents/*"
    - ".tmp/*"
    - "docs/examples/*"

build:
  nodes:
    analysis:
      dependencies:
        override:
          - 'true'
      tests:
        override:
          - js-scrutinizer-run
    tests:
      # The dashboard "add repository" preset defines a tests node; keep it a
      # green no-op (real tests run in GitHub Actions). This stub can be
      # removed once the dashboard configuration field is cleared.
      dependencies:
        override:
          - 'true'
      tests:
        override:
          - 'true'
